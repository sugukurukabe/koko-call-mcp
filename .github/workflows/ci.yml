name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run bench
      - run: npm run docs:api
      - run: npm run api:health
      - run: npm run registry:validate
      - run: npm run build:repro
      - run: npm run sbom
