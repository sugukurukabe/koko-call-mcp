name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run bench
      - run: npm run docs:check
      - run: npm run api:health
      - run: npm run registry:validate
      - run: npm run sbom
      - run: |
          TARBALL=$(npm pack --json | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>console.log(JSON.parse(s)[0].filename))")
          TMPDIR=$(mktemp -d)
          npm install --prefix "$TMPDIR" "./$TARBALL" >/dev/null
          test -x "$TMPDIR/node_modules/.bin/jp-bids-mcp"
          "$TMPDIR/node_modules/.bin/jp-bids-mcp" --version
