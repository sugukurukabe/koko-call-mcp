name: API Health Check

on:
  schedule:
    - cron: "30 20 * * *"
  workflow_dispatch:

jobs:
  fixture-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run api:health

  live-health:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run api:health
        env:
          RUN_LIVE_KKJ_CHECK: "1"
